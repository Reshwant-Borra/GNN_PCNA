# Telegram Remote Research Gateway — whitelist + settings
#
# The bot token is NEVER stored here. It is read from the env var named by
# `bot_token_env` (default: TELEGRAM_BOT_TOKEN). Set it before launch:
#
#   Windows (PowerShell):  $env:TELEGRAM_BOT_TOKEN = "<token>"
#   Linux / macOS:         export TELEGRAM_BOT_TOKEN=<token>
#
# Get your numeric Telegram user id by DMing @userinfobot, then add an entry
# below. Only listed users can interact with the bot. Roles:
#   owner        — full access; approves risky / long-running tasks
#   collaborator — can run non-risky intents
#   viewer       — read-only (status / pending / get / whoami)
#
# Approval model: risky + long-running intents queue for owner approval REGARDLESS
# of submitter role (yes — owners too, so a fat-finger on your phone doesn't kick
# off a 4-hour GPU run on the remote machine). Set `auto_approve: true` on a
# user to opt that user out and run their submissions immediately. Use this only
# for trusted in-person operators (e.g. the person running the bot on their box).

bot_token_env: TELEGRAM_BOT_TOKEN

# Long-polling interval (seconds). 1.0 is a good default.
poll_interval: 1.0

users:
  - telegram_id: 6458158983
    username: rishi
    role: owner
    auto_approve: true

  - telegram_id: 6142851395
    username: advay
    role: collaborator
    auto_approve: false

  # Example: the person whose machine runs the bot, opting out of approval.
  # - telegram_id: 987654321
  #   username:    rishi
  #   role:        owner
  #   auto_approve: true         # local operator on the compute box

  # Example collaborator entry (uncomment + edit to enable):
  # - telegram_id: 111222333
  #   username:    reshwant
  #   role:        collaborator
  #   auto_approve: false

  # Example viewer entry:
  # - telegram_id: 555555555
  #   username:    guest
  #   role:        viewer
